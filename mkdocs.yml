site_name: education

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え

plugins:
  - search:
      lang: ja

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css